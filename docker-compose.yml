services:
  fabtrack:
    build:
      context: .
      dockerfile: Dockerfile
    image: fabtrack:latest
    container_name: fabtrack
    restart: unless-stopped
    ports:
      - "${FABTRACK_PORT:-5555}:5555"
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-}
      FLASK_DEBUG: "0"
      TZ: ${TZ:-Europe/Paris}
    volumes:
      - ${FABTRACK_DATA_PATH:-./docker-data/data}:/app/data
      - ${FABTRACK_UPLOADS_PATH:-./docker-data/uploads}:/app/static/uploads
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
