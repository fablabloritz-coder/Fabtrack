services:
  fabtrack:
    build: .
    container_name: fabtrack
    ports:
      - "${FABTRACK_PORT:-5555}:5555"
    volumes:
      - ${FABTRACK_DATA_PATH:-./docker-data/data}:/app/data
      - ${FABTRACK_UPLOADS_PATH:-./docker-data/uploads}:/app/static/uploads
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-}
      FLASK_DEBUG: "0"
      TZ: ${TZ:-Europe/Paris}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:5555/api/reference', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    mem_limit: 512m
